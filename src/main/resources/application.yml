spring:
  application:
    name: code-bogo

  datasource:
    url: jdbc:mysql://localhost:3306/codebogo?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ---
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
